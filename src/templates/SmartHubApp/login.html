{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Login</title>

    <link rel="stylesheet"
          href="{% static 'css/login.css' %}">
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>SmartHub Portal</h1>

        <p>Student Login</p>

        {% if error %}
            <div class="error">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input type="email"
                   name="institution_email"
                   placeholder="Institution Email"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            Don't have an account?
            <a href="{% url 'signup' %}">
                Register
            </a>
        </p>

    </div>

</div>

</body>
</html>
