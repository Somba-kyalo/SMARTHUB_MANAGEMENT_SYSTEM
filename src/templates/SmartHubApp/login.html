{% load static %}

<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartHub Login</title>

<link rel="stylesheet" href="{% static 'css/login.css' %}">

</head>

<body>

<div class="login-container">

<div class="login-card">

<h1>SmartHub</h1>

<p>Student Login</p>

{% if error %}

<div class="error">{{ error }}</div>
{% endif %}

<form method="POST">

{% csrf_token %}

<label>Registration Number or Institution Email</label> <input type="text" name="login" placeholder="Registration Number or Institution Email" required>

<label>Password</label> <input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>Don't have an account? <a href="{% url 'signup' %}">Create Account</a></p>

</div>

</div>

</body>

</html>
