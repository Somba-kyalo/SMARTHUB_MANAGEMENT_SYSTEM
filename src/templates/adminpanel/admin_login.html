{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHub Admin Login</title>

    <link rel="stylesheet" href="{% static 'css/admin_login.css' %}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="login-card">

        <div class="left">

            <img src="{% static 'images/logo.png' %}" alt="SmartHub Logo">

            <h1>SmartHub</h1>

            <p>Administration Portal</p>

            <span>
                Secure access for authorized administrators only.
            </span>

        </div>

        <div class="right">

            <h2>Administrator Login</h2>

            <p>Sign in to manage SmartHub Tech Institute.</p>

            {% if error %}
            <div class="error">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">

                {% csrf_token %}

                <div class="input-box">

                    <label>Username</label>

                    <div class="input-field">
                        <i class="fa-solid fa-user"></i>
                        <input type="text"
                               name="username"
                               placeholder="Enter username"
                               required>
                    </div>

                </div>

                <div class="input-box">

                    <label>Password</label>

                    <div class="input-field">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password"
                               name="password"
                               placeholder="Enter password"
                               required>
                    </div>

                </div>

                <button type="submit">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    Login
                </button>

            </form>

            <small>
                SmartHub Tech Institute Administration System
            </small>

        </div>

    </div>

</div>

</body>
</html>
